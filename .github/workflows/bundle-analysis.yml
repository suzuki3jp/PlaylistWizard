name: Bundle Size Analysis

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  analyze:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - uses: suzuki3jp/nextjs-turbopack-bundle-analysis@v0.0.3
        with:
          working-directory: .
          build-output-directory: app/.next
          build-command: pnpm build:packages && pnpm --filter @playlistwizard/app exec next experimental-analyze --output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Dummy values — the build does not execute server code or connect to
          # a database at compile time. These exist only to satisfy module-load
          # time references (e.g. postgres() in db/index.ts).
          DATABASE_URL: postgres://postgres:password@localhost:5432/postgres
          BETTER_AUTH_URL: http://localhost:3000
          BETTER_AUTH_SECRET: dummy-secret-for-bundle-analysis
          NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          NEXT_TELEMETRY_DISABLED: 1
