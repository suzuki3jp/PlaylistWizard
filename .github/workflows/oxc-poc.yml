name: Oxc PoC

on:
  pull_request:
    paths:
      - "packages/**"
      - "apps/api/**"
      - "apps/www/**"
      - "scripts/**"
      - ".oxfmtrc.json"
      - ".oxlintrc.json"
      - ".github/workflows/oxc-poc.yml"
      - "**/package.json"
      - "pnpm-lock.yaml"
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions: {}

jobs:
  oxc:
    if: |
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # The PoC only checks touched files with Oxfmt so existing
          # Biome-formatted code does not create an unrelated migration diff.
          fetch-depth: 0
      - name: Setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm and Install dependencies
        uses: ./.github/workflows/scripts/pnpmInstall
        with:
          devDeps: true
      - name: Run Oxlint PoC
        run: pnpm poc:oxlint
      - name: Run Oxfmt PoC on changed files
        run: pnpm poc:oxfmt
        env:
          OXFMT_BASE_REF: origin/${{ github.base_ref }}
